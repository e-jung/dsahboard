<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Task Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;height:100vh}
#login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;text-align:center}
#login-box h1{font-size:24px;margin-bottom:8px}
#login-box p{color:#8b949e;margin-bottom:24px}
#login-box input{width:100%;padding:10px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:14px;margin-bottom:16px}
#login-box button{width:100%;padding:10px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer}
#login-box button:hover{background:#2ea043}
#error{color:#f85149;font-size:13px;margin-top:8px;display:none}
#app{display:none}
header{background:#161b22;border-bottom:1px solid #21262d;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:18px}
header .actions{display:flex;gap:8px;align-items:center}
header .meta{color:#8b949e;font-size:13px;margin-right:12px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e1e4e8;font-size:13px;cursor:pointer}
.btn:hover{background:#30363d}
.btn-primary{background:#238636;border-color:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-danger{color:#f85149;border-color:#f8514940}
.btn-danger:hover{background:#f8514920}

.sidebar{position:fixed;left:0;top:49px;bottom:0;width:240px;background:#161b22;border-right:1px solid #21262d;padding:16px 0;overflow-y:auto}
.sidebar h3{font-size:11px;text-transform:uppercase;color:#8b949e;padding:0 16px;margin-bottom:8px;letter-spacing:.5px}
.sidebar .item{padding:8px 16px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}
.sidebar .item:hover{background:#21262d}
.sidebar .item.active{background:#21262d;border-left:2px solid #58a6ff}
.sidebar .count{margin-left:auto;background:#21262d;padding:2px 8px;border-radius:10px;font-size:12px;color:#8b949e}

.board{margin-left:240px;padding:20px;display:flex;gap:16px;overflow-x:auto;min-height:calc(100vh - 49px)}
.column{flex:0 0 300px;background:#0d1117;border:1px solid #21262d;border-radius:8px;max-height:calc(100vh - 90px);display:flex;flex-direction:column}
.col-header{padding:12px 16px;font-weight:600;font-size:14px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between}
.col-header .badge{font-size:12px;color:#8b949e;font-weight:normal}
.col-body{padding:8px;overflow-y:auto;flex:1}

.card{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#388bfd}
.card .title{font-size:14px;font-weight:500;margin-bottom:6px}
.card .meta{display:flex;gap:8px;align-items:center;font-size:12px;flex-wrap:wrap}
.priority{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.priority.urgent{background:#490202;color:#f85149}
.priority.high{background:#3d1e00;color:#d29922}
.priority.medium{background:#0c2d6b;color:#58a6ff}
.priority.low{background:#0d1117;color:#8b949e;border:1px solid #30363d}
.project-tag{color:#8b949e}
.due{color:#8b949e}
.due.overdue{color:#f85149}
.empty{color:#8b949e;font-size:13px;padding:20px;text-align:center}

#detail{position:fixed;right:0;top:49px;bottom:0;width:440px;background:#161b22;border-left:1px solid #21262d;transform:translateX(100%);transition:transform .2s;z-index:20;overflow-y:auto}
#detail.open{transform:translateX(0)}
#detail .close{position:absolute;top:12px;right:12px;background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer}
#detail .content{padding:24px}
#detail h2{font-size:18px;margin-bottom:16px;padding-right:30px}
#detail .field{margin-bottom:16px}
#detail .label{font-size:12px;color:#8b949e;text-transform:uppercase;margin-bottom:4px}
#detail .notes{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;font-size:13px;line-height:1.5}
#detail .notes:empty{display:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:flex;align-items:center;justify-content:center}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:480px;max-width:90vw}
.modal h2{margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:12px;color:#8b949e;text-transform:uppercase;margin-bottom:4px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:14px;font-family:inherit}
.modal textarea{min-height:80px;resize:vertical}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Markdown */
.md-preview{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;font-size:13px;line-height:1.6}
.md-preview h1,.md-preview h2,.md-preview h3{margin:12px 0 6px;color:#e1e4e8}
.md-preview p{margin-bottom:8px}
.md-preview ul,.md-preview ol{margin-left:20px;margin-bottom:8px}
.md-preview code{background:#21262d;padding:2px 6px;border-radius:3px;font-size:12px}
.md-preview pre{background:#0d1117;padding:12px;border-radius:6px;overflow-x:auto;margin-bottom:8px}
.md-preview pre code{background:none;padding:0}
.md-preview a{color:#58a6ff}
.md-preview blockquote{border-left:3px solid #30363d;padding-left:12px;color:#8b949e;margin-bottom:8px}

/* Status buttons */
.status-btns{display:flex;gap:4px;flex-wrap:wrap}
.status-btn{padding:4px 10px;border-radius:12px;font-size:12px;border:1px solid #30363d;background:#0d1117;color:#8b949e;cursor:pointer}
.status-btn:hover{border-color:#58a6ff;color:#e1e4e8}
.status-btn.active{border-color:#58a6ff;color:#58a6ff;background:#0c2d6b}
</style>
</head>
<body>

<div id="login">
  <div id="login-box">
    <h1>🦀 Clawd Dashboard</h1>
    <p>Enter password to access</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button onclick="authenticate()">Access</button>
    <div id="error">Wrong password</div>
  </div>
</div>

<div id="app">
  <header>
    <h1>🦀 Task Dashboard</h1>
    <div class="actions">
      <span class="meta" id="stats"></span>
      <button class="btn" onclick="openNewTask()">+ Task</button>
      <button class="btn" onclick="openNewProject()">+ Project</button>
    </div>
  </header>
  <div class="sidebar">
    <h3>Projects</h3>
    <div id="projects"></div>
  </div>
  <div class="board" id="board"><div class="loading" style="text-align:center;padding:40px;color:#8b949e">Loading...</div></div>
  <div id="detail"><button class="close" onclick="closeDetail()">&times;</button><div class="content" id="detail-content"></div></div>
</div>

<div id="modal-container"></div>

<script>
const SB='https://jfyxnxgjwntbegdyorfl.supabase.co',KEY='sb_publishable_PjGMV9JjA_cPSWPOoK-M6g_6qjKOwOR';
const PWH='f2a83bd45966a95a68e54bd74a4aa8625857c2eb86b37863aeb956595af9160c';
let tasks=[],notes=[],projects=[],curProj=null,curDetail=null;

function sha256(str){let h=0x6a09e667,b=0xbb67ae85,c=0x3c6ef372,d=0xa54ff53a,e=0x510e527f,f=0x9b05688c,g=0x1f83d9ab,h2=0x5be0cd19;const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];function rr(v,n){return(v>>>n)|(v<<32-n)}function ch(x,y,z){return(x&y)^((~x)&z)}function maj(x,y,z){return(x&y)^(x&z)^(y&z)}const msg=unescape(encodeURIComponent(str));const bytes=[];for(let i=0;i<msg.length;i++){bytes.push(msg.charCodeAt(i))}bytes.push(128);while(bytes.length%64!==56)bytes.push(0);const len=msg.length*8;for(let i=56;i>=0;i-=8)bytes.push((len/(1<<(56-i)))&0xff);for(let i=0;i<bytes.length;i+=64){const w=[];for(let j=0;j<16;j++)w[j]=(bytes[i+j*4]<<24)|(bytes[i+j*4+1]<<16)|(bytes[i+j*4+2]<<8)|bytes[i+j*4+3];for(let j=16;j<64;j++){const s0=rr(w[j-15],7)^rr(w[j-15],18)^(w[j-15]>>>3);const s1=rr(w[j-2],17)^rr(w[j-2],19)^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+s1)>>>0}let a=h,b=b,c=c,d=d,e=e,f=f,g=g,hh=h2;for(let j=0;j<64;j++){const S1=rr(e,6)^rr(e,11)^rr(e,25);const ch1=ch(e,f,g);const temp1=(hh+S1+ch1+K[j]+w[j])>>>0;const S0=rr(a,2)^rr(a,13)^rr(a,22);const maj1=maj(a,b,c);const temp2=(S0+maj1)>>>0;hh=g;g=f;f=e;e=(d+temp1)>>>0;d=c;c=b;b=a;a=(temp1+temp2)>>>0}h=(h+a)>>>0;b=(b+b)>>>0;c=(c+c)>>>0;d=(d+d)>>>0;e=(e+e)>>>0;f=(f+f)>>>0;g=(g+g)>>>0;h2=(h2+hh)>>>0}function hex(n){return('00000000'+n.toString(16)).slice(-8)}return hex(h)+hex(b)+hex(c)+hex(d)+hex(e)+hex(f)+hex(g)+hex(h2)}
function auth(){const h=sha256(document.getElementById('pw').value);if(h===PWH){sessionStorage.setItem('a','1');document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';load()}else document.getElementById('error').style.display='block'}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')auth()});
if(sessionStorage.getItem('a')==='1'){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';load()}

async function sb(table,q=''){const r=await fetch(`${SB}/rest/v1/${table}?${q}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});return r.json()}
async function sbPost(table,body){return fetch(`${SB}/rest/v1/${table}`,{method:'POST',headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(body)}).then(r=>r.json())}
async function sbPatch(table,id,body){return fetch(`${SB}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(body)}).then(r=>r.json())}
async function sbDel(table,id){return fetch(`${SB}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}})}

async function load(){
  projects=await sb('projects','select=*&order=name');
  tasks=await sb('tasks','select=*,projects(name)&order=created_at.asc');
  notes=await sb('notes','select=*&order=created_at.desc');
  render();
}

function render(){
  renderSidebar();
  renderBoard();
  const vis=tasks.filter(t=>t.status!=='archived'&&(curProj?t.project_id===curProj:true));
  const done=vis.filter(t=>t.status==='done').length;
  document.getElementById('stats').textContent=`${vis.length} tasks · ${done} done`;
}

function renderSidebar(){
  const el=document.getElementById('projects');
  const all=tasks.filter(t=>t.status!=='archived'&&(curProj?t.project_id===curProj:true)).length;
  el.innerHTML=`<div class="item ${!curProj?'active':''}" onclick="filterProj(null)">All <span class="count">${all}</span></div>`+
    projects.filter(p=>p.status!=='archived').map(p=>{
      const c=tasks.filter(t=>t.project_id===p.id&&t.status!=='archived').length;
      return`<div class="item ${curProj===p.id?'active':''}" onclick="filterProj('${p.id}')">${p.name} <span class="count">${c}</span></div>`;
    }).join('');
}

function filterProj(id){curProj=id;render()}
function renderBoard(){
  const vis=tasks.filter(t=>t.status!=='archived'&&(curProj?t.project_id===curProj:true));
  const statuses=['backlog','todo','in_progress','done'];
  const labels={backlog:'📋 Backlog',todo:'📌 To Do',in_progress:'🔄 In Progress',done:'✅ Done'};
  document.getElementById('board').innerHTML=statuses.map(s=>{
    const st=vis.filter(t=>t.status===s);
    return`<div class="column"><div class="col-header">${labels[s]}<span class="badge">${st.length}</span></div><div class="col-body">${st.length?st.map(card).join(''):'<div class="empty">No tasks</div>'}</div></div>`;
  }).join('');
}

function card(t){
  const od=t.due_date&&new Date(t.due_date)<new Date()&&t.status!=='done';
  const p=t.projects?.name||'';
  return`<div class="card" onclick="showDetail('${t.id}')"><div class="title">${esc(t.title)}</div><div class="meta"><span class="priority ${t.priority}">${t.priority}</span>${p?`<span class="project-tag">@${esc(p)}</span>`:''}${t.due_date?`<span class="due ${od?'overdue':''}">${t.due_date}</span>`:''}</div></div>`;
}

function showDetail(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  curDetail=id;
  const tn=notes.filter(n=>n.task_id===id);
  const pn=notes.filter(n=>n.project_id===t.project_id&&n.task_id===null);
  const proj=projects.find(p=>p.id===t.project_id);
  const dc=document.getElementById('detail-content');
  dc.innerHTML=`
    <h2>${esc(t.title)}</h2>
    <div class="field"><div class="label">Status</div><div class="status-btns">${['backlog','todo','in_progress','done','archived'].map(s=>`<span class="status-btn ${t.status===s?'active':''}" onclick="setStatus('${t.id}','${s}')">${s}</span>`).join('')}</div></div>
    <div class="field"><div class="label">Priority</div><div class="status-btns">${['low','medium','high','urgent'].map(p=>`<span class="status-btn ${t.priority===p?'active':''}" onclick="setPriority('${t.id}','${p}')">${p}</span>`).join('')}</div></div>
    <div class="field"><div class="label">Project</div>${proj?esc(proj.name):'None'}</div>
    ${t.due_date?`<div class="field"><div class="label">Due</div>${t.due_date}</div>`:''}
    ${t.description?`<div class="field"><div class="label">Description</div><div class="md-preview">${renderMd(t.description)}</div></div>`:''}
    ${pn.length?`<div class="field"><div class="label">Project Notes (${pn.length})</div>${pn.map(n=>`<div class="md-preview" style="margin-bottom:8px">${renderMd(n.content)}<div style="color:#8b949e;font-size:11px;margin-top:4px">${n.created_at?.split('T')[0]} · ${esc(n.source||'')}</div></div>`).join('')}</div>`:''}
    ${tn.length?`<div class="field"><div class="label">Task Notes (${tn.length})</div>${tn.map(n=>`<div class="md-preview" style="margin-bottom:8px">${renderMd(n.content)}<div style="color:#8b949e;font-size:11px;margin-top:4px">${n.created_at?.split('T')[0]} · ${esc(n.source||'')}</div></div>`).join('')}</div>`:''}
    <div class="field"><div class="label">Add Note</div><textarea id="new-note" placeholder="Write a note (markdown supported)..."></textarea><button class="btn btn-primary" style="margin-top:8px" onclick="addNote('${t.id}','${t.project_id}')">Add Note</button></div>
    <div style="margin-top:16px"><button class="btn btn-danger" onclick="deleteTask('${t.id}')">Delete Task</button></div>`;
  document.getElementById('detail').classList.add('open');
}

function closeDetail(){document.getElementById('detail').classList.remove('open');curDetail=null}

async function setStatus(id,s){await sbPatch('tasks',id,{status:s});if(s==='done')await sbPatch('tasks',id,{completed_at:new Date().toISOString()});load();if(curDetail)showDetail(id)}
async function setPriority(id,p){await sbPatch('tasks',id,{priority:p});load();if(curDetail)showDetail(id)}
async function deleteTask(id){if(!confirm('Delete this task?'))return;await sbDel('tasks',id);closeDetail();load()}

async function addNote(taskId,projId){
  const el=document.getElementById('new-note');if(!el||!el.value.trim())return;
  await sbPost('notes',{content:el.value.trim(),task_id:taskId,project_id:projId,note_type:'context',source:'dashboard'});
  el.value='';load();showDetail(taskId);
}

function openNewTask(){
  const opts=projects.filter(p=>p.status!=='archived').map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal"><h2>New Task</h2>
        <div class="field"><label>Title</label><input id="nt-title" placeholder="Task title"></div>
        <div class="field"><label>Project</label><select id="nt-proj"><option value="">None</option>${opts}</select></div>
        <div class="field"><label>Priority</label><select id="nt-pri"><option value="medium">Medium</option><option value="low">Low</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
        <div class="field"><label>Status</label><select id="nt-status"><option value="backlog">Backlog</option><option value="todo">To Do</option><option value="in_progress">In Progress</option></select></div>
        <div class="field"><label>Due Date</label><input id="nt-due" type="date"></div>
        <div class="field"><label>Description (markdown)</label><textarea id="nt-desc" rows="4"></textarea></div>
        <div class="actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createTask()">Create</button></div>
      </div>
    </div>`;
  document.getElementById('nt-title').focus();
}

async function createTask(){
  const title=document.getElementById('nt-title').value.trim();if(!title)return;
  const body={title,source:'dashboard',priority:document.getElementById('nt-pri').value,status:document.getElementById('nt-status').value};
  const proj=document.getElementById('nt-proj').value;if(proj)body.project_id=proj;
  const due=document.getElementById('nt-due').value;if(due)body.due_date=due;
  const desc=document.getElementById('nt-desc').value.trim();if(desc)body.description=desc;
  await sbPost('tasks',body);closeModal();load();
}

function openNewProject(){
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal"><h2>New Project</h2>
        <div class="field"><label>Name</label><input id="np-name" placeholder="Project name"></div>
        <div class="field"><label>Category</label><select id="np-cat"><option value="personal">Personal</option><option value="work">Work</option><option value="dev">Dev</option><option value="family">Family</option></select></div>
        <div class="field"><label>Description (markdown)</label><textarea id="np-desc" rows="4"></textarea></div>
        <div class="actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createProject()">Create</button></div>
      </div>
    </div>`;
  document.getElementById('np-name').focus();
}

async function createProject(){
  const name=document.getElementById('np-name').value.trim();if(!name)return;
  const body={name,category:document.getElementById('np-cat').value,status:'active'};
  const desc=document.getElementById('np-desc').value.trim();if(desc)body.description=desc;
  await sbPost('projects',body);closeModal();load();
}

function closeModal(){document.getElementById('modal-container').innerHTML=''}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderMd(text){
  if(!text)return'';
  let h=esc(text);
  // Bold, italic, code, links
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/`(.+?)`/g,'<code>$1</code>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Headers
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Lists
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  // Blockquotes
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Paragraphs
  h=h.replace(/\n\n/g,'</p><p>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p><\/p>/g,'');
  return h;
}
</script>
</body>
</html>
